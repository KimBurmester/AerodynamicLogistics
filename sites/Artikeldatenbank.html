<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Artikeldatenbank</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Artikeldatenbank</h2>
        <button class="btn btn-primary btn-sm" data-action="neuer-artikel">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neuer Artikel
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Gesamtartikel</div>
            <div class="metric-value" id="kpi-gesamt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Aktiv</div>
            <div class="metric-value metric-value-success" id="kpi-aktiv">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Gesperrt</div>
            <div class="metric-value metric-value-danger" id="kpi-gesperrt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Mindestbestand unterschritten</div>
            <div class="metric-value metric-value-warning" id="kpi-unterbestand">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Artikelnummer oder Bezeichnung suchen…" />
        </div>
        <div class="field min-w-160">
            <select>
                <option value="">Alle Warengruppen</option>
                <option>Abwassertechnik</option><option>Antriebstechnik</option><option>Automatisierungstechnik</option>
                <option>Befestigungsmittel</option><option>Behälter &amp; Tanks</option><option>Beleuchtung</option>
                <option>Chemikalien &amp; Schmierstoffe</option><option>Dichtungen &amp; O-Ringe</option>
                <option>Elektrotechnik</option><option>Elektronik</option><option>Filter &amp; Siebe</option>
                <option>Fördertechnik</option><option>Gefahrstoffe</option><option>Heizungstechnik</option>
                <option>Hydraulik</option><option>Hygieneprodukte</option><option>Kabel &amp; Leitungen</option>
                <option>Kältetechnik</option><option>Klimatechnik</option><option>Kompressoren &amp; Verdichter</option>
                <option>Kunststoffteile</option><option>Küchen- &amp; Lebensmitteltechnik</option>
                <option>Lagertechnik</option><option>Lebensmittel</option><option>Lüftungstechnik</option>
                <option>Mechanik</option><option>Messtechnik</option><option>Motoren &amp; Getriebe</option>
                <option>Pneumatik</option><option>Pumpen &amp; Armaturen</option><option>Regalsysteme</option>
                <option>Reinigungsmittel</option><option>Rohre &amp; Schläuche</option><option>Sanitärtechnik</option>
                <option>Schutzausrüstung (PSA)</option><option>Schweißtechnik</option><option>Sensoren &amp; Aktoren</option>
                <option>Stahlbau &amp; Metallbau</option><option>Steuerungstechnik</option><option>Transportmittel</option>
                <option>Verbrauchsmaterial</option><option>Verpackungsmaterial</option>
                <option>Werkzeuge &amp; Betriebsmittel</option><option>Wärmetauscher</option>
            </select>
        </div>
        <div class="field min-w-140">
            <select>
                <option value="">Alle Status</option>
                <option>Aktiv</option>
                <option>Neuanlage</option>
                <option>In Prüfung</option>
                <option>In Wartung</option>
                <option>Inaktiv</option>
                <option>Gesperrt</option>
                <option>Defekt</option>
                <option>Ausgelaufen</option>
            </select>
        </div>
        <button class="btn btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
        </button>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Artikelnr.</th>
                    <th>Bezeichnung</th>
                    <th>Warengruppe</th>
                    <th>Einheit</th>
                    <th>Bestand</th>
                    <th>Mindestbestand</th>
                    <th>Lagerort</th>
                    <th>Status</th>
                    <th>QR-Code</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info"></span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
