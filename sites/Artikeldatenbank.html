<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Artikeldatenbank</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Artikeldatenbank</h2>
        <button class="btn btn-primary btn-sm" data-action="neuer-artikel">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neuer Artikel
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Gesamtartikel</div>
            <div class="metric-value" id="kpi-gesamt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Aktiv</div>
            <div class="metric-value metric-value-success" id="kpi-aktiv">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Gesperrt</div>
            <div class="metric-value metric-value-danger" id="kpi-gesperrt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Mindestbestand unterschritten</div>
            <div class="metric-value metric-value-warning" id="kpi-unterbestand">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Artikelnummer oder Bezeichnung suchen…" />
        </div>
        <div class="field min-w-160">
            <select>
                <option value="">Alle Warengruppen</option>
                <option>Hydraulik</option>
                <option>Elektronik</option>
                <option>Mechanik</option>
                <option>Verbrauchsmaterial</option>
            </select>
        </div>
        <div class="field min-w-140">
            <select>
                <option value="">Alle Status</option>
                <option>Aktiv</option>
                <option>Gesperrt</option>
                <option>Ausgelaufen</option>
            </select>
        </div>
        <button class="btn btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
        </button>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Artikelnr.</th>
                    <th>Bezeichnung</th>
                    <th>Warengruppe</th>
                    <th>Einheit</th>
                    <th>Bestand</th>
                    <th>Mindestbestand</th>
                    <th>Lagerort</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info"></span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
