<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Qualitätssicherung</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Qualitätssicherung</h2>
        <button class="btn btn-primary btn-sm" data-action="neuer-pruefbericht">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neuer Prüfbericht
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Prüfungen gesamt</div>
            <div class="metric-value" id="kpi-qs-gesamt">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Bestanden (i.O.)</div>
            <div class="metric-value metric-value-success" id="kpi-qs-bestanden">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Nacharbeit erforderlich</div>
            <div class="metric-value metric-value-warning" id="kpi-qs-nacharbeit">0</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Nicht bestanden (n.i.O.)</div>
            <div class="metric-value metric-value-danger" id="kpi-qs-niO">0</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="qs-search" placeholder="Prüfber.-Nr., Artikel oder Seriennr. suchen…" />
        </div>
        <div class="field min-w-170">
            <select id="qs-filter-auftrag">
                <option value="">Alle Produktionsaufträge</option>
                <option>PRD-2026-0001 – Hydraulikeinheit HE-400</option>
                <option>PRD-2026-0002 – Drucksensorbaugruppe DS-200</option>
                <option>PRD-2026-0003 – Pneumatikmodul PM-50</option>
                <option>PRD-2026-0004 – Kugelventilblock KVB-40</option>
                <option>PRD-2026-0005 – Hydraulikschlauchset HLP</option>
                <option>PRD-2026-0006 – Steuerventil SV-300</option>
                <option>PRD-2026-0007 – Druckbehälter DB-60</option>
                <option>PRD-2026-0008 – Filtereinheit FE-200</option>
            </select>
        </div>
        <div class="field min-w-160">
            <select id="qs-filter-pruefart">
                <option value="">Alle Prüfarten</option>
                <option>Sichtprüfung</option>
                <option>Maßkontrolle</option>
                <option>Drucktest</option>
                <option>Funktionstest</option>
                <option>Laboranalyse</option>
                <option>Schweißnahtprüfung</option>
                <option>ZfP / Ultraschall</option>
            </select>
        </div>
        <div class="field min-w-150">
            <select id="qs-filter-ergebnis">
                <option value="">Alle Ergebnisse</option>
                <option value="i.O. (in Ordnung)">i.O. (in Ordnung)</option>
                <option value="Nacharbeit erforderlich">Nacharbeit erforderlich</option>
                <option value="n.i.O. (nicht in Ordnung)">n.i.O. (nicht in Ordnung)</option>
            </select>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Prüfber.-Nr.</th>
                    <th>Artikel / Bezeichnung</th>
                    <th>Seriennr. / Charge</th>
                    <th>Prüfart</th>
                    <th>Prüfdatum</th>
                    <th>Prüfer</th>
                    <th>Ergebnis</th>
                    <th>Maßnahme</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Legende -->
    <div class="legend-row">
        <span class="legend-label">Legende:</span>
        <span class="badge badge-success"><span class="dot"></span>i.O. (in Ordnung)</span>
        <span class="badge badge-warning"><span class="dot"></span>Nacharbeit erforderlich</span>
        <span class="badge badge-danger"><span class="dot"></span>n.i.O. (nicht in Ordnung)</span>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info"></span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
