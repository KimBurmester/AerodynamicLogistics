<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Artikelverwaltung</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">
    <h2 class="section-title">Artikelverwaltung</h2>

    <!-- Stammdaten -->
    <p class="form-group-label">Stammdaten</p>
    <div class="grid-4">
        <div class="field">
            <label>Artikelbezeichnung</label>
            <input type="text" id="artikelbezeichnung" placeholder="z. B. Hydraulikschlauch" />
        </div>
        <div class="field">
            <label>Artikelnummer</label>
            <input type="text" id="artikelnummer" placeholder="z. B. 239324875" />
        </div>
        <div class="field">
            <label>Warengruppe</label>
            <select>
                <option>Hydraulik</option>
                <option>Elektronik</option>
                <option>Mechanik</option>
                <option>Verbrauchsmaterial</option>
            </select>
        </div>
        <div class="field">
            <label>Artikelstatus</label>
            <select>
                <option>Aktiv</option>
                <option>Gesperrt</option>
                <option>Ausgelaufen</option>
            </select>
        </div>
    </div>
    <div class="grid-4">
        <div class="field">
            <label>Einheit</label>
            <select>
                <option>Stück</option>
                <option>Liter</option>
                <option>Meter</option>
                <option>Kilogramm</option>
            </select>
        </div>
        <div class="field">
            <label>Chargennummer</label>
            <input type="text" id="charge" />
        </div>
        <div class="field">
            <label>Seriennummer (SN)</label>
            <input type="text" id="seriennummer" />
        </div>
        <div class="field">
            <label>Maschinennummer (MSN)</label>
            <input type="text" id="maschinennummer" />
        </div>
    </div>

    <!-- Lagerbestand -->
    <p class="form-group-label">Lagerbestand</p>
    <div class="grid-4">
        <div class="field">
            <label>Aktueller Bestand</label>
            <input type="text" id="bestand" />
        </div>
        <div class="field">
            <label>Mindestbestand</label>
            <input type="text" id="mindestbestand" />
        </div>
        <div class="field">
            <label>Meldebestand</label>
            <input type="text" id="meldebestand" />
        </div>
        <div class="field">
            <label>Lagerort</label>
            <input type="text" id="lagerort" placeholder="Halle / Regal / Fach" />
        </div>
    </div>

    <!-- Abmessungen & Verpackung -->
    <p class="form-group-label">Abmessungen & Verpackung</p>
    <div class="grid-4">
        <div class="field">
            <label>Länge (cm)</label>
            <input type="text" id="laenge" />
        </div>
        <div class="field">
            <label>Breite (cm)</label>
            <input type="text" id="breite" />
        </div>
        <div class="field">
            <label>Höhe (cm)</label>
            <input type="text" id="hoehe" />
        </div>
        <div class="field">
            <label>Gewicht (kg)</label>
            <input type="text" id="gewicht" />
        </div>
    </div>
    <div class="grid-2">
        <div class="field">
            <label>Verpackungseinheit</label>
            <select id="verpackungseinheit">
                <option>Stück</option>
                <option>Karton</option>
                <option>Palette</option>
                <option>Euro-Palette</option>
                <option>Container</option>
                <option>Box</option>
                <option>Beutel</option>
                <option>Rolle</option>
                <option>Fass</option>
                <option>Kiste</option>
                <option>Tray</option>
                <option>Big Bag</option>
            </select>
        </div>
        <div class="field">
            <label>Menge pro Einheit</label>
            <input type="text" id="mengeProEinheit" />
        </div>
    </div>

    <!-- Einkauf -->
    <p class="form-group-label">Einkauf</p>
    <div class="grid-3">
        <div class="field">
            <label>Lieferant</label>
            <select id="lieferant">
                <option></option>
                <option>Bosch Rexroth AG</option>
                <option>WAGO Kontakttechnik GmbH &amp; Co. KG</option>
                <option>Robert Bosch GmbH</option>
                <option>Siemens AG</option>
                <option>thyssenkrupp AG</option>
                <option>Festo SE &amp; Co. KG</option>
                <option>Parker Hannifin GmbH</option>
                <option>Hydac International GmbH</option>
                <option>ifm electronic gmbh</option>
                <option>Balluff GmbH</option>
                <option>SICK AG</option>
                <option>Würth Industrie Service GmbH &amp; Co. KG</option>
                <option>Continental AG</option>
                <option>ZF Friedrichshafen AG</option>
                <option>MAN Truck &amp; Bus SE</option>
                <option>Trumpf GmbH + Co. KG</option>
                <option>Rittal GmbH &amp; Co. KG</option>
            </select>
        </div>
        <div class="field">
            <label>Einkaufspreis (€)</label>
            <input type="text" id="einkaufspreis" />
        </div>
        <div class="field">
            <label>Mindestbestellmenge</label>
            <input type="text" id="mindestbestellmenge" />
        </div>
    </div>

    <!-- Verkauf -->
    <p class="form-group-label">Verkauf</p>
    <div class="grid-3">
        <div class="field">
            <label>Verkaufspreis (€)</label>
            <input type="text" id="verkaufspreis" />
        </div>
        <div class="field">
            <label>Steuersatz</label>
            <select>
                <option>19 %</option>
                <option>7 %</option>
                <option>0 %</option>
            </select>
        </div>
        <div class="field">
            <label>Zolltarifnummer</label>
            <input type="text" id="zolltarifnummer" />
        </div>
    </div>

    <!-- Beschreibung -->
    <p class="form-group-label">Beschreibung</p>
    <div class="field">
        <label>Beschreibung</label>
        <textarea rows="4" id="beschreibung" placeholder="Optionale Beschreibung des Artikels..."></textarea>

    <!-- Buttons -->

        <button class="btn btn-primary">Speichern</button>

<script src="script.js"></script>
</html>
