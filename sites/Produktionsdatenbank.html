<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Produktionsdatenbank</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Produktionsdatenbank</h2>
        <button class="btn btn-primary btn-sm" data-navigate="sites/Produktion.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neuer Produktionsauftrag
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Gesamtaufträge</div>
            <div class="metric-value" id="kpi-prd-gesamt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Laufend</div>
            <div class="metric-value metric-value-info" id="kpi-prd-laufend">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Abgeschlossen</div>
            <div class="metric-value metric-value-success" id="kpi-prd-abgeschlossen">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Verzögert</div>
            <div class="metric-value metric-value-danger" id="kpi-prd-verzoegert">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="prd-search" placeholder="Auftrags-Nr., Produkt oder Artikelnr. suchen…" />
        </div>
        <div class="field min-w-170">
            <select id="prd-filter-linie">
                <option value="">Alle Produktionslinien</option>
                <option>Linie 1</option>
                <option>Linie 2</option>
                <option>Linie 3</option>
                <option>Montagelinie A</option>
                <option>Montagelinie B</option>
            </select>
        </div>
        <div class="field min-w-160">
            <select id="prd-filter-status">
                <option value="">Alle Status</option>
                <option>Planung</option>
                <option>Laufend</option>
                <option>Abgeschlossen</option>
                <option>Verzögert</option>
                <option>Pausiert</option>
            </select>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Auftrags-Nr.</th>
                    <th>Produkt / Bezeichnung</th>
                    <th>Artikelnr.</th>
                    <th>Menge</th>
                    <th>Produktionslinie</th>
                    <th>Geplanter Start</th>
                    <th>Geplantes Ende</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- wird dynamisch befüllt -->
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info">—</span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
