<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Produktionsdatenbank</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<style>
  .data-table tbody tr { cursor: pointer; }
  .data-table tbody td.td-actions { cursor: default; white-space: nowrap; text-align: right; }
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; align-items: center; justify-content: center; padding: 16px; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--bg-primary); border: 0.5px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 28px 28px 22px; max-width: 440px; width: 100%; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
  .confirm-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
  .confirm-msg   { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 22px; }
  .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .td-empty { text-align: center; padding: 40px !important; color: var(--text-tertiary); font-size: 13px; }
</style>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Produktionsdatenbank</h2>
        <button class="btn btn-primary btn-sm" id="btn-neuer-prd">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neuer Produktionsauftrag
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Gesamtaufträge</div>
            <div class="metric-value" id="kpi-prd-gesamt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Laufend</div>
            <div class="metric-value metric-value-info" id="kpi-prd-laufend">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Abgeschlossen</div>
            <div class="metric-value metric-value-success" id="kpi-prd-abgeschlossen">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Verzögert</div>
            <div class="metric-value metric-value-danger" id="kpi-prd-verzoegert">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="prd-search" placeholder="Auftrags-Nr., Produkt oder Artikelnr. suchen…" />
        </div>
        <div class="field min-w-170">
            <select id="prd-filter-linie">
                <option value="">Alle Produktionslinien</option>
                <option>Linie 1</option>
                <option>Linie 2</option>
                <option>Linie 3</option>
                <option>Montagelinie A</option>
                <option>Montagelinie B</option>
            </select>
        </div>
        <div class="field min-w-160">
            <select id="prd-filter-status">
                <option value="">Alle Status</option>
                <option>Planung</option>
                <option>Laufend</option>
                <option>Abgeschlossen</option>
                <option>Verzögert</option>
                <option>Pausiert</option>
            </select>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Auftrags-Nr.</th>
                    <th>Produkt / Bezeichnung</th>
                    <th>Artikelnr.</th>
                    <th>Menge</th>
                    <th>Produktionslinie</th>
                    <th>Geplanter Start</th>
                    <th>Geplantes Ende</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="prd-tbody">
                <!-- wird dynamisch befüllt -->
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info" id="prd-info">—</span>
        <div class="pagination-buttons"></div>
    </div>

</section>

<!-- Modal: Neuer Produktionsauftrag / Bearbeiten -->
<div class="modal-overlay" id="modal-prd" role="dialog" aria-modal="true"
     aria-labelledby="modal-prd-title">
  <div class="modal" style="max-width:860px;">
    <div class="modal-header">
      <h3 id="modal-prd-title">Neuen Produktionsauftrag anlegen</h3>
      <button class="modal-close" id="modal-prd-close" aria-label="Schließen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">

      <p class="form-group-label">Auftragsdaten</p>
      <div class="grid-4">
        <div class="field">
          <label>Auftrags-Nr.</label>
          <input type="text" id="prd-nr" placeholder="wird automatisch vergeben" readonly />
        </div>
        <div class="field" style="grid-column: span 2;">
          <label>Produkt / Bezeichnung</label>
          <input type="text" id="prd-bezeichnung" placeholder="z. B. Hydraulikeinheit HE-400" />
        </div>
        <div class="field">
          <label>Artikelnr.</label>
          <input type="text" id="prd-artikelnr" placeholder="z. B. ART-2026-0042" />
        </div>
      </div>
      <div class="grid-4">
        <div class="field">
          <label>Menge</label>
          <input type="text" id="prd-menge" placeholder="z. B. 10 Stück" />
        </div>
        <div class="field">
          <label>Produktionslinie</label>
          <select id="prd-linie">
            <option value="">— bitte wählen —</option>
            <option>Linie 1</option>
            <option>Linie 2</option>
            <option>Linie 3</option>
            <option>Montagelinie A</option>
            <option>Montagelinie B</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="prd-status">
            <option value="">— bitte wählen —</option>
            <option>Planung</option>
            <option>Laufend</option>
            <option>Abgeschlossen</option>
            <option>Verzögert</option>
            <option>Pausiert</option>
          </select>
        </div>
      </div>

      <p class="form-group-label">Zeitplanung</p>
      <div class="grid-4">
        <div class="field">
          <label>Geplanter Start</label>
          <input type="date" id="prd-start" />
        </div>
        <div class="field">
          <label>Geplantes Ende</label>
          <input type="date" id="prd-ende" />
        </div>
        <div class="field">
          <label>Verantwortlicher</label>
          <input type="text" id="prd-verantwortlich" placeholder="z. B. K. Burmester" />
        </div>
      </div>

      <p class="form-group-label">Bemerkung</p>
      <div class="field">
        <label>Bemerkung / Hinweise</label>
        <textarea id="prd-bemerkung" rows="3"
          placeholder="Optionale Beschreibung oder Hinweise zum Produktionsauftrag…"></textarea>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="modal-prd-save">Speichern</button>
      <button class="btn" id="modal-prd-cancel">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Bestätigungsdialog: Löschen -->
<div class="confirm-overlay" id="prd-confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Produktionsauftrag löschen</div>
    <div class="confirm-msg" id="prd-confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn" id="prd-confirm-cancel">Abbrechen</button>
      <button class="btn btn-danger" id="prd-confirm-ok">Endgültig löschen</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const store  = ADLStore.produktionsauftraege;
  let editId   = null;
  let deleteId = null;
  let allData  = [];

  const BADGE = {
    'Laufend':       'info',
    'Planung':       'secondary',
    'Abgeschlossen': 'success',
    'Verzögert':     'danger',
    'Pausiert':      'warning',
  };
  function badge(s) {
    if (!s) return '–';
    return `<span class="badge badge-${BADGE[s] || 'info'}"><span class="dot"></span>${esc(s)}</span>`;
  }
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleDateString('de-DE');
  }

  function renderKPIs(data) {
    document.getElementById('kpi-prd-gesamt').textContent        = data.length;
    document.getElementById('kpi-prd-laufend').textContent       = data.filter(r => r.status === 'Laufend').length;
    document.getElementById('kpi-prd-abgeschlossen').textContent = data.filter(r => r.status === 'Abgeschlossen').length;
    document.getElementById('kpi-prd-verzoegert').textContent    = data.filter(r => r.status === 'Verzögert').length;
  }

  const EDIT_SVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const DEL_SVG  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

  function renderTable(data) {
    const tbody = document.getElementById('prd-tbody');
    const total = allData.length;
    document.getElementById('prd-info').textContent =
      data.length === total
        ? `${total} Auftrag${total !== 1 ? 'e' : ''} im System`
        : `${data.length} von ${total} Aufträgen`;

    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="9" class="td-empty">Keine Produktionsaufträge gefunden.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr data-id="${esc(r.id)}">
        <td style="font-weight:600;white-space:nowrap;">${esc(r.nr || '–')}</td>
        <td>${esc(r.bezeichnung || '–')}</td>
        <td class="td-mono">${esc(r.artikelnr || '–')}</td>
        <td style="color:var(--text-secondary);">${esc(r.menge || '–')}</td>
        <td style="color:var(--text-secondary);">${esc(r.linie || '–')}</td>
        <td style="color:var(--text-secondary);white-space:nowrap;">${fmtDate(r.start)}</td>
        <td style="color:var(--text-secondary);white-space:nowrap;">${fmtDate(r.ende)}</td>
        <td>${badge(r.status)}</td>
        <td class="td-actions">
          <button class="btn btn-sm" title="Bearbeiten"
                  data-action="edit" data-id="${esc(r.id)}">${EDIT_SVG}</button>
          <button class="btn btn-sm" title="Löschen" style="color:var(--danger-text);"
                  data-action="delete" data-id="${esc(r.id)}"
                  data-label="${esc(r.nr || r.id)}">${DEL_SVG}</button>
        </td>
      </tr>`).join('');
  }

  function reload() {
    allData = store.getAll();
    renderKPIs(allData);
    applyFilter();
  }

  function applyFilter() {
    const q  = document.getElementById('prd-search').value.trim().toLowerCase();
    const li = document.getElementById('prd-filter-linie').value;
    const st = document.getElementById('prd-filter-status').value;
    const filtered = allData.filter(r => {
      if (li && r.linie  !== li) return false;
      if (st && r.status !== st) return false;
      if (q) {
        const hay = [r.nr, r.bezeichnung, r.artikelnr, r.menge, r.linie]
          .join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    renderTable(filtered);
  }

  const modal      = document.getElementById('modal-prd');
  const modalTitle = document.getElementById('modal-prd-title');

  function getVal(id) { return (document.getElementById(id)?.value ?? '').trim(); }
  function setVal(id, v) { const el = document.getElementById(id); if (el) el.value = v ?? ''; }

  function openModal(title, record) {
    modalTitle.textContent = title;
    setVal('prd-nr',            record?.nr            || store.nextNr('PRD', 'nr'));
    setVal('prd-bezeichnung',   record?.bezeichnung   || '');
    setVal('prd-artikelnr',     record?.artikelnr     || '');
    setVal('prd-menge',         record?.menge         || '');
    setVal('prd-linie',         record?.linie         || '');
    setVal('prd-status',        record?.status        || 'Planung');
    setVal('prd-start',         record?.start         || new Date().toISOString().slice(0, 10));
    setVal('prd-ende',          record?.ende          || '');
    setVal('prd-verantwortlich', record?.verantwortlicher || '');
    setVal('prd-bemerkung',     record?.bemerkung     || '');
    modal.classList.add('open');
    document.getElementById('prd-bezeichnung').focus();
  }

  function closeModal() { modal.classList.remove('open'); editId = null; }

  function saveModal() {
    const bezeichnung = getVal('prd-bezeichnung');
    if (!bezeichnung) { document.getElementById('prd-bezeichnung').focus(); return; }
    const data = {
      nr:               getVal('prd-nr'),
      bezeichnung,
      artikelnr:        getVal('prd-artikelnr'),
      menge:            getVal('prd-menge'),
      linie:            getVal('prd-linie'),
      status:           getVal('prd-status'),
      start:            getVal('prd-start'),
      ende:             getVal('prd-ende'),
      verantwortlicher: getVal('prd-verantwortlich'),
      bemerkung:        getVal('prd-bemerkung'),
    };
    if (editId) { store.update(editId, data); }
    else        { store.add(data); }
    closeModal();
    reload();
  }

  const confirmOverlay = document.getElementById('prd-confirm-overlay');

  function openConfirm(id, label) {
    deleteId = id;
    document.getElementById('prd-confirm-msg').textContent =
      `Soll Produktionsauftrag „${label}" wirklich endgültig gelöscht werden? Diese Aktion kann nicht rückgängig gemacht werden.`;
    confirmOverlay.classList.add('open');
  }
  function closeConfirm() { confirmOverlay.classList.remove('open'); deleteId = null; }

  document.getElementById('btn-neuer-prd').addEventListener('click', () => {
    editId = null; openModal('Neuen Produktionsauftrag anlegen', null);
  });
  document.getElementById('modal-prd-close').addEventListener('click', closeModal);
  document.getElementById('modal-prd-cancel').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.getElementById('modal-prd-save').addEventListener('click', saveModal);

  document.getElementById('prd-search').addEventListener('input', applyFilter);
  document.getElementById('prd-filter-linie').addEventListener('change', applyFilter);
  document.getElementById('prd-filter-status').addEventListener('change', applyFilter);

  document.getElementById('prd-tbody').addEventListener('click', e => {
    const row = e.target.closest('tr[data-id]');
    if (!row) return;
    const btn = e.target.closest('[data-action]');
    if (btn) {
      const id = btn.dataset.id;
      if (btn.dataset.action === 'edit') {
        editId = id; openModal('Produktionsauftrag bearbeiten', store.getById(id));
      } else if (btn.dataset.action === 'delete') {
        openConfirm(id, btn.dataset.label);
      }
      return;
    }
    editId = row.dataset.id;
    openModal('Produktionsauftrag bearbeiten', store.getById(editId));
  });

  document.getElementById('prd-confirm-cancel').addEventListener('click', closeConfirm);
  confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirm(); });
  document.getElementById('prd-confirm-ok').addEventListener('click', () => {
    if (deleteId) { store.remove(deleteId); closeConfirm(); reload(); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeConfirm(); }
  });
  modal.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); saveModal(); }
  });

  reload();
})();
</script>
</main>
</body>
</html>
