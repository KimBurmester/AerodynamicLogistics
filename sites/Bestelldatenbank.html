<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Bestelldatenbank</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Bestelldatenbank</h2>
        <button class="btn btn-primary btn-sm" data-navigate="sites/Bestellung.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neue Bestellung
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Gesamtbestellungen</div>
            <div class="metric-value" id="kpi-bst-gesamt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Offen</div>
            <div class="metric-value metric-value-info" id="kpi-bst-offen">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">In Lieferung</div>
            <div class="metric-value metric-value-warning" id="kpi-bst-lieferung">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Abgeschlossen</div>
            <div class="metric-value metric-value-success" id="kpi-bst-abgeschlossen">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Bestellnr. oder Lieferant suchen…" />
        </div>
        <div class="field min-w-170">
            <select>
                <option value="">Alle Lieferanten</option>
                <option>Bosch Rexroth AG</option>
                <option>Parker Hannifin GmbH</option>
                <option>Hydac International GmbH</option>
                <option>Festo SE &amp; Co. KG</option>
                <option>Siemens AG</option>
                <option>WAGO Kontakttechnik GmbH</option>
                <option>Würth Industrie Service</option>
                <option>ifm electronic gmbh</option>
            </select>
        </div>
        <div class="field min-w-160">
            <select>
                <option value="">Alle Status</option>
                <option>Entwurf</option>
                <option>Offen</option>
                <option>In Lieferung</option>
                <option>Abgeschlossen</option>
                <option>Storniert</option>
            </select>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Bestellnr.</th>
                    <th>Lieferant</th>
                    <th>Bestelldatum</th>
                    <th>Gew. Lieferdatum</th>
                    <th>Wert (€)</th>
                    <th>Positionen</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info"></span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
