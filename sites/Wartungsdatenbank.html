<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Dynamic Logistic – Wartungsdatenbank</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../logistikapp.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<main>
<section class="container">

    <div class="page-header">
        <h2 class="section-title">Wartungsdatenbank</h2>
        <button class="btn btn-primary btn-sm" data-navigate="sites/Instandhaltung.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neue Wartung
        </button>
    </div>

    <!-- KPIs -->
    <div class="grid-4 kpi-row">
        <div class="metric-card">
            <div class="metric-label">Gesamtaufträge</div>
            <div class="metric-value" id="kpi-wt-gesamt">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Offen / Geplant</div>
            <div class="metric-value metric-value-info" id="kpi-wt-offen">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">In Arbeit</div>
            <div class="metric-value metric-value-warning" id="kpi-wt-arbeit">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Abgeschlossen</div>
            <div class="metric-value metric-value-success" id="kpi-wt-abgeschlossen">—</div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Auftragsnr., Gerät oder Techniker suchen…" />
        </div>
        <div class="field min-w-170">
            <select>
                <option value="">Alle Kategorien</option>
                <option>Produktionsmaschinen</option>
                <option>Fördertechnik</option>
                <option>Flurförderfahrzeuge</option>
                <option>Fahrzeuge</option>
                <option>Halleninfrastruktur</option>
                <option>Elektrotechnik</option>
                <option>Druckluft &amp; Hydraulik</option>
                <option>Prüfmittel</option>
            </select>
        </div>
        <div class="field min-w-150">
            <select>
                <option value="">Alle Hallen</option>
                <option>Halle 1</option>
                <option>Halle 2</option>
                <option>Halle 3</option>
                <option>Außengelände</option>
                <option>Werkstatt</option>
            </select>
        </div>
        <div class="field min-w-160">
            <select>
                <option value="">Alle Status</option>
                <option>Geplant</option>
                <option>Offen</option>
                <option>In Arbeit</option>
                <option>Abgeschlossen</option>
                <option>Abgebrochen</option>
            </select>
        </div>
        <div class="field min-w-140">
            <select>
                <option value="">Alle Prioritäten</option>
                <option>Niedrig</option>
                <option>Normal</option>
                <option>Hoch</option>
                <option>Dringend</option>
                <option>Notfall</option>
            </select>
        </div>
    </div>

    <!-- Tabelle -->
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Auftragsnr.</th>
                    <th>Gerät / Anlage</th>
                    <th>Kategorie</th>
                    <th>Halle</th>
                    <th>Wartungsart</th>
                    <th>Priorität</th>
                    <th>Geplant am</th>
                    <th>Techniker</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-row">
        <span class="pagination-info"></span>
        <div class="pagination-buttons"></div>
    </div>

</section>
</main>
</body>
</html>
